name: vyklik

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: ghcr.io/bantamer/vyklik:latest
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
  volumes:
    - ./queues.yml:/app/queues.yml:ro

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    <<: *app
    restart: "no"
    command: ["alembic", "upgrade", "head"]

  poller:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "vyklik.poller"]

  bot:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "vyklik.bot"]
    ports:
      - "127.0.0.1:8080:8080"  # healthz; bind to localhost, expose via reverse proxy if needed
