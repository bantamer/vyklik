# DUW Wrocław queue catalog.
# Maps DUW queue IDs (returned by the status API) to curated short display names.
# Edit these freely — the poller upserts on raw_name, the bot reads display_pl/display_ru.
# Add new queue IDs as DUW publishes them. Unknown IDs are still tracked but display
# the raw API name until added here.
#
# Keep names short — Telegram inline buttons truncate without wrapping.
# Rule of thumb: aim for ≤28 visible characters (status emoji + space + name).

